# ============================================================
# 📱 自动构建 APK (使用 Buildozer + Python-for-Android)
# ============================================================
# 使用方法：
#   1. 把代码推送到 GitHub
#   2. 这个 Action 会自动构建 APK
#   3. 在 Actions 页面下载生成的 APK
# ============================================================

name: 构建 Android APK

on:
  workflow_dispatch:    # 手动触发
  push:
    tags:
      - "v*"            # 推送标签时触发

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool \
            libffi-dev libssl-dev libxml2-dev libxslt1-dev \
            libncurses5-dev ccache \
            libtool-bin automake autoconf-archive cmake curl wget

      - name: 安装 Buildozer & Cython
        run: |
          pip install --upgrade buildozer cython virtualenv

      - name: 创建 Buildozer 配置
        run: |
          mkdir -p .buildozer

      - name: 预接受 Android SDK 许可证
        run: |
          # 创建标准 Android 许可证文件（避免 sdkmanager 交互式询问）
          mkdir -p ~/.android/licenses
          # android-sdk-license 的已接受哈希值
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > ~/.android/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> ~/.android/licenses/android-sdk-license
          echo "✅ 许可证已预接受"
          
          # 安装 expect 用于处理交互式提示
          sudo apt-get install -y -qq expect 2>/dev/null || true

      - name: 构建 APK
        run: |
          # 清除缓存和降级 setuptools
          rm -rf .buildozer/android/platform/build-* ~/.gradle/caches/
          pip install "setuptools<72" wheel --upgrade
          export PIP_NO_BUILD_ISOLATION=0
          unset GRADLE_HOME 2>/dev/null || true
          export GRADLE_HOME=""
          # 构建 APK
          export JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64
          export ANDROID_SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          buildozer android debug
        env:
          BUILD_RUNNING_ON_CI: "1"

      - name: 上传 APK
        uses: actions/upload-artifact@v5
        with:
          name: 新闻归纳助手-APK
          path: bin/*.apk

      - name: 创建 Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*.apk
          body: |
            📱 每日新闻归纳助手 Android APK
            
            ## 安装说明
            - 下载 APK 文件
            - 在手机上打开安装
            - 允许「未知来源应用安装」
            - 打开应用后配置 API 密钥即可使用
            
            ## 支持设备
            - 小米 / 红米 (MIUI/HyperOS)
            - 华为 (HarmonyOS)
            - 荣耀 (MagicOS)
            - OPPO / vivo
            - 其他 Android 8.0+ 设备

      - name: 列出生成的 APK
        run: |
          ls -lh bin/ || echo "bin/ 目录不存在"
          find . -name "*.apk" -type f 2>/dev/null || echo "未找到 APK 文件"
